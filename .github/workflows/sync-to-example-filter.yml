name: Sync to ExampleFilter

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout FilterForge
        uses: actions/checkout@v4
        with:
          path: FilterForge

      - name: Checkout ExampleFilter
        uses: actions/checkout@v4
        with:
          repository: Maaaaaarrk/ExampleFilter
          token: ${{ secrets.PAT_TOKEN }}
          path: ExampleFilter

      - name: Copy files
        run: |
          rsync -av --exclude='.git' --exclude='.github' FilterForge/ ExampleFilter/

      - name: Commit and push to ExampleFilter
        run: |
          cd ExampleFilter
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync from FilterForge @ ${{ github.sha }}"
            git push
          fi
